<!DOCTYPE html>
<html>
<head>
    <title>Submission Detail - IPFS Mapper</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://unpkg.com/dropzone@5/dist/min/dropzone.min.css" rel="stylesheet" />
    <style>
        /* Table header styling - darker gray like Excel */
        table thead th {
            background-color: #9ca3af !important; /* darker gray */
            color: #ffffff !important; /* white text */
            font-size: 14px !important;
            font-weight: 600 !important;
            padding: 10px 12px !important;
            border-right: 1px solid #6b7280 !important;
            border-bottom: 2px solid #6b7280 !important;
        }
        
        table thead th:last-child {
            border-right: none !important;
        }
        
        /* Alternating row colors - Excel style */
        table tbody tr:nth-child(odd) {
            background-color: #ffffff !important;
        }
        
        table tbody tr:nth-child(even) {
            background-color: #e5e7eb !important; /* light gray */
        }
        
        table tbody tr:hover {
            background-color: #dbeafe !important; /* light blue hover */
        }
        
        /* Cell borders for Excel look */
        table tbody td {
            border-right: 1px solid #d1d5db !important;
            border-bottom: 1px solid #d1d5db !important;
        }
        
        table tbody td:last-child {
            border-right: none !important;
        }
        
        /* Make tables more structured */
        table {
            border-collapse: collapse !important;
            border: 1px solid #9ca3af !important;
        }
        
        /* File upload section */
        .file-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #f9fafb;
            position: relative;
            transition: all 0.2s;
        }
        
        .file-item:hover {
            background: #f3f4f6;
            border-color: #d1d5db;
        }
        
        .file-icon {
            width: 48px;
            height: 48px;
            fill: #ef4444;
        }
        
        .file-name {
            font-size: 11px;
            color: #374151;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .delete-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .delete-btn:hover {
            background: #dc2626;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="px-4 py-2">
        <!-- Header with Back Button -->
        <div class="flex items-center gap-3 mb-4">
            <a href="/" class="text-blue-600 hover:text-blue-800 font-semibold text-sm">← Back to Submissions</a>
            <h1 id="submissionTitle" class="text-xl font-bold flex-1">Loading...</h1>
            <div id="appetiteScoreBadge" class="hidden">
                <!-- Appetite score will be inserted here -->
            </div>
            <div class="flex items-center gap-2">
                <label class="text-sm font-semibold text-gray-700">Status:</label>
                <select id="statusDropdown" class="border border-gray-300 rounded px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="RECEIVED">Received</option>
                    <option value="IN_PROGRESS">In Progress</option>
                    <option value="CHOSEN">Chosen</option>
                    <option value="SENT_TO_FINANCE">Sent to Finance</option>
                </select>
                <button id="saveBtn" class="bg-green-600 text-white px-4 py-1 rounded text-sm hover:bg-green-700 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Save
                </button>
                <button id="cancelBtn" class="bg-gray-500 text-white px-4 py-1 rounded text-sm hover:bg-gray-600 transition">
                    Cancel
                </button>
            </div>
        </div>

        <!-- Drop Zone with Uploaded Files -->
        <div class="flex items-start gap-3 mb-2">
            <div class="flex-1 bg-white rounded-lg shadow-sm p-2">
                <form id="uploadForm" class="dropzone border-2 border-dashed rounded-lg p-4 text-center min-h-[150px]">
                    <!-- Uploaded Files List (shown above drop message) -->
                    <div id="filesList" class="flex flex-wrap gap-3 justify-center mb-4">
                        <!-- Files will be inserted here -->
                    </div>

                    <div class="dz-message" data-dz-message>
                        <p class="text-gray-600 text-xs">Drag & drop additional quotes here or click to browse</p>
                        <p class="text-xs text-gray-400 mt-0.5">PDF, PNG, JPG</p>
                    </div>
                </form>
            </div>
        </div>

        <!-- Results Display -->
        <div id="result" class="space-y-4">
            <!-- Basic Info Table -->
            <div id="basicInfoTable" class="bg-white rounded-lg shadow-sm overflow-hidden">
                <div class="bg-gray-50 px-4 py-2 border-b border-gray-200">
                    <h2 class="text-sm font-semibold text-gray-800">Basic Information</h2>
                </div>
                <div class="p-4">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr id="basicInfoHeader">
                                <!-- Basic info headers will be populated here -->
                            </tr>
                        </thead>
                        <tbody id="basicInfoBody">
                            <!-- Basic info data will be populated here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Quotes Table -->
            <div id="quotesTable" class="bg-white rounded-lg shadow-sm overflow-hidden">
                <div class="bg-gray-50 px-4 py-2 border-b border-gray-200">
                    <h2 class="text-sm font-semibold text-gray-800">Quotes</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr id="quotesHeader">
                                <!-- Quote headers will be populated here -->
                            </tr>
                        </thead>
                        <tbody id="quotesBody">
                            <!-- Quote data will be populated here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Totals Table -->
            <div id="totalsTable" class="bg-white rounded-lg shadow-sm overflow-hidden">
                <div class="bg-gray-50 px-4 py-2 border-b border-gray-200">
                    <h2 class="text-sm font-semibold text-gray-800">Totals</h2>
                </div>
                <div class="p-4">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr id="totalsHeader">
                                <!-- Totals headers will be populated here -->
                            </tr>
                        </thead>
                        <tbody id="totalsBody">
                            <!-- Totals data will be populated here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/dropzone@5/dist/min/dropzone.min.js"></script>
    <script>
        Dropzone.autoDiscover = false;

        // Get submission ID from URL
        const submissionId = parseInt('{{ submission_id }}');
        let submissionData = null;
        let quotes = [];

        // Load submission data on page load
        async function loadSubmission() {
            try {
                const response = await fetch(`/api/submission/${submissionId}`);
                const data = await response.json();

                if (data.success) {
                    submissionData = data.submission;
                    quotes = data.quotes;

                    // Update title
                    document.getElementById('submissionTitle').textContent =
                        `${submissionData.insured_name} - ${submissionData.effective_date}`;

                    // Update status dropdown
                    const statusDropdown = document.getElementById('statusDropdown');
                    statusDropdown.value = submissionData.status.toUpperCase().replace(/ /g, '_');
                    originalStatus = statusDropdown.value;

                    // Display appetite score
                    displayAppetiteScore();

                    // Display uploaded files
                    displayUploadedFiles();

                    // Display existing quotes
                    displayQuotes();
                }
            } catch (error) {
                console.error('Error loading submission:', error);
            }
        }

        async function displayAppetiteScore() {
            try {
                const response = await fetch(`/api/submission/${submissionId}/appetite`);
                const data = await response.json();

                if (data.success && data.appetite) {
                    const appetite = data.appetite;
                    const badge = document.getElementById('appetiteScoreBadge');

                    let colorClass = 'bg-gray-500';
                    if (appetite.total_score >= 80) {
                        colorClass = 'bg-green-600';
                    } else if (appetite.total_score >= 60) {
                        colorClass = 'bg-blue-600';
                    } else if (appetite.total_score >= 40) {
                        colorClass = 'bg-yellow-600';
                    } else {
                        colorClass = 'bg-red-600';
                    }

                    badge.className = `${colorClass} text-white px-4 py-2 rounded-lg text-sm font-semibold cursor-help`;
                    badge.title = `PF Appetite: ${appetite.rating}\n\nPremium Size: ${appetite.breakdown.premium_size.score}/${appetite.breakdown.premium_size.max} (${appetite.breakdown.premium_size.label})\nDown Payment: ${appetite.breakdown.down_payment.score}/${appetite.breakdown.down_payment.max} (${appetite.breakdown.down_payment.label})\nState Risk: ${appetite.breakdown.state_risk.score}/${appetite.breakdown.state_risk.max} (${appetite.breakdown.state_risk.label})`;
                    badge.textContent = `PF Appetite: ${appetite.total_score}/100`;
                }
            } catch (error) {
                console.error('Error loading appetite score:', error);
            }
        }

        function displayUploadedFiles() {
            const filesList = document.getElementById('filesList');
            filesList.innerHTML = '';

            if (quotes.length === 0) {
                return;
            }

            quotes.forEach(quote => {
                const filename = quote.raw_document_path.split('/').pop();

                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <div class="delete-btn" onclick="deleteQuote(${quote.id}, '${filename}')">×</div>
                    <svg class="file-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20M10,19L12,15H9V10H15V15L13,19H10Z"/>
                    </svg>
                    <span class="file-name" title="${filename}">${filename}</span>
                `;
                filesList.appendChild(fileItem);
            });
        }

        async function deleteQuote(quoteId, filename) {
            const confirmDelete = confirm(`Are you sure you want to delete "${filename}"?\n\n${quotes.length === 1 ? 'This is the only quote. The submission will also be deleted.' : ''}`);

            if (!confirmDelete) {
                return;
            }

            try {
                const response = await fetch(`/api/quote/${quoteId}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    if (data.submission_deleted) {
                        // Submission was deleted, redirect to kanban
                        alert('Quote and submission deleted successfully.');
                        window.location.href = '/';
                    } else {
                        // Just reload the submission
                        alert('Quote deleted successfully.');
                        loadSubmission();
                    }
                } else {
                    alert('Error deleting quote: ' + data.error);
                }
            } catch (error) {
                console.error('Error deleting quote:', error);
                alert('Error deleting quote.');
            }
        }

        function displayQuotes() {
            if (quotes.length === 0) {
                document.getElementById('result').innerHTML =
                    '<div class="text-center text-gray-500 py-8">No quotes yet. Upload a quote to get started.</div>';
                return;
            }

            // Convert quotes to the format expected by displayResults
            const results = quotes.map(quote => {
                return {
                    response: quote.extracted_json,
                    quote_id: quote.id,
                    carrier: quote.carrier_name
                };
            });

            displayResults(results);
        }

        // Dropzone for uploading additional quotes
        const myDropzone = new Dropzone("#uploadForm", {
            url: "/api/upload_quote",
            autoProcessQueue: false,
            acceptedFiles: ".pdf,.png,.jpg,.jpeg",
            addRemoveLinks: false,
            previewTemplate: '<div style="display:none"></div>'
        });

        myDropzone.on("addedfile", function(file) {
            // Auto-upload when file is added
            const formData = new FormData();
            formData.append('file', file);
            formData.append('submission_id', submissionId);

            // Show processing message
            const contentDiv = document.getElementById('parsedContent');
            const processingMsg = document.createElement('div');
            processingMsg.className = 'text-center text-gray-500 py-8';
            processingMsg.textContent = 'Processing new quote...';
            processingMsg.id = 'processing-msg';
            contentDiv.appendChild(processingMsg);

            fetch('/api/upload_quote', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                // Remove processing message
                const msg = document.getElementById('processing-msg');
                if (msg) msg.remove();

                if (data.success) {
                    // Reload submission to show new quote
                    loadSubmission();
                    myDropzone.removeAllFiles();
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Upload failed');
                const msg = document.getElementById('processing-msg');
                if (msg) msg.remove();
            });
        });

        function copyToClipboard(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                // Visual feedback - briefly highlight the cell
                const originalBg = element.style.backgroundColor;
                element.style.backgroundColor = '#10b981';
                element.style.color = 'white';
                
                setTimeout(() => {
                    element.style.backgroundColor = originalBg;
                    element.style.color = '';
                }, 300);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        function displayResults(results) {
            // Clear all tables
            document.getElementById('basicInfoBody').innerHTML = '';
            document.getElementById('quotesHeader').innerHTML = '';
            document.getElementById('quotesBody').innerHTML = '';
            document.getElementById('totalsBody').innerHTML = '';

            // Collect all data for tables
            let allBasicInfo = null;
            let allQuotes = [];
            let allTotals = [];

            results.forEach((result, fileIndex) => {
                try {
                    // Extract the JSON string from the response
                    let jsonString = result.response || JSON.stringify(result);

                    // Remove markdown code block formatting if present
                    jsonString = jsonString.replace(/^```json\n/, '').replace(/\n```$/, '');

                    // Parse the JSON
                    const data = JSON.parse(jsonString);

                    // Capture basic info from first file
                    if (fileIndex === 0) {
                        allBasicInfo = data;
                    }

                    // Process policies
                    if (data.policies && Array.isArray(data.policies)) {
                        data.policies.forEach((policy, policyIndex) => {
                            allQuotes.push({
                                fileIndex: fileIndex + 1,
                                policyIndex: policyIndex + 1,
                                carrier: policy.carrier,
                                coverage: policy.coverage_type,
                                policyNumber: policy.policy_number,
                                effective: policy.effective_date,
                                expiration: policy.expiration_date,
                                term: policy.policy_term,
                                premium: policy.annual_premium,
                                tax: policy.tax,
                                fee: policy.fee,
                                brokerFee: policy.broker_fee,
                                minEarnedPercent: policy.minimum_earned_percent,
                                minEarnedAmount: policy.minimum_earned_amount
                            });
                        });
                    } else {
                        // Fallback if no policies array
                        allQuotes.push({
                            fileIndex: fileIndex + 1,
                            policyIndex: 1,
                            carrier: data.carrier,
                            coverage: data.coverage_type,
                            policyNumber: data.policy_number,
                            effective: data.effective_date,
                            expiration: data.expiration_date,
                            term: data.policy_term,
                            premium: data.annual_premium,
                            tax: data.tax,
                            fee: data.fee,
                            brokerFee: data.broker_fee,
                            minEarnedPercent: data.minimum_earned_percent,
                            minEarnedAmount: data.minimum_earned_amount
                        });
                    }

                    // Collect totals (once per file)
                    if (data.totals) {
                        allTotals.push({
                            fileIndex: fileIndex + 1,
                            totalPremium: data.totals.total_premium,
                            totalTax: data.totals.total_tax,
                            totalFee: data.totals.total_fee,
                            grandTotal: data.totals.grand_total
                        });
                    }

                    // Collect financing info (once per file)
                    if (data.financing) {
                        const financeIndex = allTotals.length - 1;
                        if (financeIndex >= 0) {
                            allTotals[financeIndex].deposit = data.financing.down_payment;
                            allTotals[financeIndex].amountFinanced = data.financing.amount_financed;
                        }
                    }

                } catch (e) {
                    console.error('Error parsing file', fileIndex + 1, ':', e.message);
                }
            });

            // Populate tables
            if (allBasicInfo) {
                populateBasicInfoTable(allBasicInfo);
            }
            populateQuotesTable(allQuotes);
            populateTotalsTable(allTotals);
        }

        function populateBasicInfoTable(data) {
            const header = document.getElementById('basicInfoHeader');
            const tbody = document.getElementById('basicInfoBody');
            
            // Create headers
            const fields = [
                { label: 'Insured Name', value: data.insured?.name || null },
                { label: 'Address', value: (() => {
                    if (data.insured?.address) {
                        const addr = data.insured.address;
                        const parts = [addr.street, addr.city, addr.state, addr.zip].filter(p => p);
                        return parts.length > 0 ? parts.join(', ') : null;
                    }
                    return null;
                })() },
                { label: 'Agent Name', value: data.agent?.name || null },
                { label: 'Agency (Broker)', value: data.agency?.name || null },
                { label: 'Agency Phone', value: data.agency?.phone || null },
                { label: 'Quote #', value: data.quote_number || null },
                { label: 'Account #', value: data.account_number || null }
            ];

            // Create header row
            fields.forEach(field => {
                const th = document.createElement('th');
                th.className = 'px-3 py-2 text-left whitespace-nowrap';
                th.textContent = field.label;
                header.appendChild(th);
            });

            // Create data row
            const dataRow = document.createElement('tr');
            dataRow.className = 'border-b border-gray-200';
            
            fields.forEach(field => {
                const td = document.createElement('td');
                td.className = 'px-3 py-2 text-gray-900 cursor-pointer';
                const value = field.value || 'null';
                td.innerHTML = `<span class="field-value text-xs">${value === 'null' ? '<span class="text-gray-400 italic">null</span>' : value}</span>`;
                td.onclick = () => copyToClipboard(value, td);
                dataRow.appendChild(td);
            });
            
            tbody.appendChild(dataRow);
        }

        function populateQuotesTable(quotes) {
            const header = document.getElementById('quotesHeader');
            const tbody = document.getElementById('quotesBody');

            // Create headers
            const headers = ['Coverage', 'Carrier', 'Policy #', 'Effective', 'Expiration', 'Term', 'Premium', 'Tax', 'Fee', 'Broker Fee', 'Min Earned %', 'Min Earned $'];
            headers.forEach(headerText => {
                const th = document.createElement('th');
                th.className = 'px-3 py-2 text-left whitespace-nowrap';
                th.textContent = headerText;
                header.appendChild(th);
            });

            // Create rows
            quotes.forEach((quote, index) => {
                const row = document.createElement('tr');
                row.className = 'border-b border-gray-200';
                
                const values = [
                    quote.coverage,
                    quote.carrier,
                    quote.policyNumber,
                    quote.effective,
                    quote.expiration,
                    quote.term,
                    quote.premium,
                    quote.tax,
                    quote.fee,
                    quote.brokerFee,
                    quote.minEarnedPercent,
                    quote.minEarnedAmount
                ];

                values.forEach((value, index) => {
                    const td = document.createElement('td');
                    td.className = 'px-3 py-2 text-xs text-gray-900 whitespace-nowrap cursor-pointer';
                    
                    const cellValue = value || 'null';
                    td.innerHTML = `<span class="field-value">${cellValue === 'null' ? '<span class="text-gray-400 italic">null</span>' : cellValue}</span>`;
                    td.onclick = () => copyToClipboard(cellValue, td);
                    row.appendChild(td);
                });

                tbody.appendChild(row);
            });
        }

        function populateTotalsTable(totals) {
            const header = document.getElementById('totalsHeader');
            const tbody = document.getElementById('totalsBody');

            // Create headers for all total fields
            const totalFields = ['Total Premium', 'Total Tax', 'Total Fee', 'Grand Total', 'Deposit', 'Amount Financed'];
            
            totalFields.forEach(fieldLabel => {
                const th = document.createElement('th');
                th.className = 'px-3 py-2 text-left whitespace-nowrap';
                th.textContent = fieldLabel;
                header.appendChild(th);
            });

            // Create data row - combine all totals from all files
            const dataRow = document.createElement('tr');
            dataRow.className = 'border-b border-gray-200';

            // For each field, get the value from the first file (or sum if multiple files)
            totalFields.forEach(fieldLabel => {
                const td = document.createElement('td');
                td.className = 'px-3 py-2 text-gray-900 cursor-pointer';
                
                let value = null;
                if (totals.length > 0) {
                    const fieldMap = {
                        'Total Premium': 'totalPremium',
                        'Total Tax': 'totalTax', 
                        'Total Fee': 'totalFee',
                        'Grand Total': 'grandTotal',
                        'Deposit': 'deposit',
                        'Amount Financed': 'amountFinanced'
                    };
                    
                    const fieldName = fieldMap[fieldLabel];
                    if (fieldName) {
                        // If multiple files, sum the values; otherwise, use the single value
                        if (totals.length > 1 && ['totalPremium', 'totalTax', 'totalFee', 'grandTotal'].includes(fieldName)) {
                            value = totals.reduce((sum, total) => sum + (parseFloat(total[fieldName]) || 0), 0);
                        } else {
                            value = totals[0][fieldName];
                        }
                    }
                }

                const cellValue = value !== null && value !== undefined ? value : 'null';
                td.innerHTML = `<span class="field-value text-xs">${cellValue === 'null' ? '<span class="text-gray-400 italic">null</span>' : cellValue}</span>`;
                td.onclick = () => copyToClipboard(cellValue, td);
                dataRow.appendChild(td);
            });

            tbody.appendChild(dataRow);
        }

        // Track original status
        let originalStatus = null;

        // Status dropdown change handler - just enable Save button
        document.getElementById('statusDropdown').addEventListener('change', function(e) {
            const saveBtn = document.getElementById('saveBtn');

            // Enable Save button if status changed
            if (e.target.value !== originalStatus) {
                saveBtn.disabled = false;
            } else {
                saveBtn.disabled = true;
            }
        });

        // Save button handler
        document.getElementById('saveBtn').addEventListener('click', async function() {
            const statusDropdown = document.getElementById('statusDropdown');
            const newStatus = statusDropdown.value;
            const saveBtn = document.getElementById('saveBtn');
            const cancelBtn = document.getElementById('cancelBtn');

            try {
                saveBtn.disabled = true;
                cancelBtn.disabled = true;

                const response = await fetch(`/api/submission/${submissionId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                const data = await response.json();

                if (data.success) {
                    // Redirect to kanban board
                    window.location.href = '/';
                } else {
                    alert('Error updating status: ' + data.error);
                    saveBtn.disabled = false;
                    cancelBtn.disabled = false;
                }
            } catch (error) {
                console.error('Error updating status:', error);
                alert('Error updating status');
                saveBtn.disabled = false;
                cancelBtn.disabled = false;
            }
        });

        // Cancel button handler
        document.getElementById('cancelBtn').addEventListener('click', function() {
            // Return to kanban board without saving
            window.location.href = '/';
        });

        // Load submission data on page load
        loadSubmission();

    </script>
</body>
</html>
