<!DOCTYPE html>
<html>
<head>
    <title>Submission Detail - IPFS Mapper</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://unpkg.com/dropzone@5/dist/min/dropzone.min.css" rel="stylesheet" />
    <style>
        .copy-btn {
            transition: all 0.2s ease;
        }
        .copy-btn:hover {
            transform: scale(1.05);
        }
        .copy-btn.copied {
            background-color: #10b981;
            color: white;
        }
        .field-value {
            word-break: break-all;
        }
        .policy-column {
            min-width: 300px;
            max-width: 400px;
        }
        .file-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #f9fafb;
            position: relative;
            transition: all 0.2s;
        }
        .file-item:hover {
            background: #f3f4f6;
            border-color: #d1d5db;
        }
        .file-icon {
            width: 48px;
            height: 48px;
            fill: #ef4444;
        }
        .file-name {
            font-size: 11px;
            color: #374151;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .delete-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            background: #dc2626;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="px-4 py-2">
        <!-- Header with Back Button -->
        <div class="flex items-center gap-3 mb-4">
            <a href="/" class="text-blue-600 hover:text-blue-800 font-semibold text-sm">← Back to Submissions</a>
            <h1 id="submissionTitle" class="text-xl font-bold flex-1">Loading...</h1>
            <div class="flex items-center gap-2">
                <label class="text-sm font-semibold text-gray-700">Status:</label>
                <select id="statusDropdown" class="border border-gray-300 rounded px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="RECEIVED">Received</option>
                    <option value="IN_PROGRESS">In Progress</option>
                    <option value="CHOSEN">Chosen</option>
                    <option value="SENT_TO_FINANCE">Sent to Finance</option>
                </select>
                <button id="saveBtn" class="bg-green-600 text-white px-4 py-1 rounded text-sm hover:bg-green-700 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Save
                </button>
                <button id="cancelBtn" class="bg-gray-500 text-white px-4 py-1 rounded text-sm hover:bg-gray-600 transition">
                    Cancel
                </button>
            </div>
        </div>

        <!-- Drop Zone with Uploaded Files -->
        <div class="flex items-start gap-3 mb-2">
            <div class="flex-1 bg-white rounded-lg shadow-sm p-2">
                <form id="uploadForm" class="dropzone border-2 border-dashed rounded-lg p-4 text-center min-h-[150px]">
                    <!-- Uploaded Files List (shown above drop message) -->
                    <div id="filesList" class="flex flex-wrap gap-3 justify-center mb-4">
                        <!-- Files will be inserted here -->
                    </div>

                    <div class="dz-message" data-dz-message>
                        <p class="text-gray-600 text-xs">Drag & drop additional quotes here or click to browse</p>
                        <p class="text-xs text-gray-400 mt-0.5">PDF, PNG, JPG</p>
                    </div>
                </form>
            </div>
        </div>

        <!-- Results Display -->
        <div id="result">
            <div id="insuredInfo" class="bg-white rounded-lg shadow-sm p-2 mb-2 flex gap-2 flex-wrap"></div>
            <div id="parsedContent" class="flex gap-2 overflow-x-auto pb-2"></div>
        </div>
    </div>

    <script src="https://unpkg.com/dropzone@5/dist/min/dropzone.min.js"></script>
    <script>
        Dropzone.autoDiscover = false;

        // Get submission ID from URL
        const submissionId = {{ submission_id }};
        let submissionData = null;
        let quotes = [];

        // Load submission data on page load
        async function loadSubmission() {
            try {
                const response = await fetch(`/api/submission/${submissionId}`);
                const data = await response.json();

                if (data.success) {
                    submissionData = data.submission;
                    quotes = data.quotes;

                    // Update title
                    document.getElementById('submissionTitle').textContent =
                        `${submissionData.insured_name} - ${submissionData.effective_date}`;

                    // Update status dropdown
                    const statusDropdown = document.getElementById('statusDropdown');
                    statusDropdown.value = submissionData.status.toUpperCase().replace(/ /g, '_');
                    originalStatus = statusDropdown.value;

                    // Display uploaded files
                    displayUploadedFiles();

                    // Display existing quotes
                    displayQuotes();
                }
            } catch (error) {
                console.error('Error loading submission:', error);
            }
        }

        function displayUploadedFiles() {
            const filesList = document.getElementById('filesList');
            filesList.innerHTML = '';

            if (quotes.length === 0) {
                return;
            }

            quotes.forEach(quote => {
                const filename = quote.raw_document_path.split('/').pop();

                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <div class="delete-btn" onclick="deleteQuote(${quote.id}, '${filename}')">×</div>
                    <svg class="file-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20M10,19L12,15H9V10H15V15L13,19H10Z"/>
                    </svg>
                    <span class="file-name" title="${filename}">${filename}</span>
                `;
                filesList.appendChild(fileItem);
            });
        }

        async function deleteQuote(quoteId, filename) {
            const confirmDelete = confirm(`Are you sure you want to delete "${filename}"?\n\n${quotes.length === 1 ? 'This is the only quote. The submission will also be deleted.' : ''}`);

            if (!confirmDelete) {
                return;
            }

            try {
                const response = await fetch(`/api/quote/${quoteId}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    if (data.submission_deleted) {
                        // Submission was deleted, redirect to kanban
                        alert('Quote and submission deleted successfully.');
                        window.location.href = '/';
                    } else {
                        // Just reload the submission
                        alert('Quote deleted successfully.');
                        loadSubmission();
                    }
                } else {
                    alert('Error deleting quote: ' + data.error);
                }
            } catch (error) {
                console.error('Error deleting quote:', error);
                alert('Error deleting quote.');
            }
        }

        function displayQuotes() {
            if (quotes.length === 0) {
                document.getElementById('result').innerHTML =
                    '<div class="text-center text-gray-500 py-8">No quotes yet. Upload a quote to get started.</div>';
                return;
            }

            // Convert quotes to the format expected by displayResults
            const results = quotes.map(quote => {
                return {
                    response: quote.extracted_json,
                    quote_id: quote.id,
                    carrier: quote.carrier_name
                };
            });

            displayResults(results);
        }

        // Dropzone for uploading additional quotes
        const myDropzone = new Dropzone("#uploadForm", {
            url: "/api/upload_quote",
            autoProcessQueue: false,
            acceptedFiles: ".pdf,.png,.jpg,.jpeg",
            addRemoveLinks: false,
            previewTemplate: '<div style="display:none"></div>'
        });

        myDropzone.on("addedfile", function(file) {
            // Auto-upload when file is added
            const formData = new FormData();
            formData.append('file', file);
            formData.append('submission_id', submissionId);

            // Show processing message
            const contentDiv = document.getElementById('parsedContent');
            const processingMsg = document.createElement('div');
            processingMsg.className = 'text-center text-gray-500 py-8';
            processingMsg.textContent = 'Processing new quote...';
            processingMsg.id = 'processing-msg';
            contentDiv.appendChild(processingMsg);

            fetch('/api/upload_quote', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                // Remove processing message
                const msg = document.getElementById('processing-msg');
                if (msg) msg.remove();

                if (data.success) {
                    // Reload submission to show new quote
                    loadSubmission();
                    myDropzone.removeAllFiles();
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Upload failed');
                const msg = document.getElementById('processing-msg');
                if (msg) msg.remove();
            });
        });

        function copyToClipboard(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                button.textContent = 'Copied!';
                button.classList.add('copied');
                setTimeout(() => {
                    button.textContent = 'Copy';
                    button.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        function displayResults(results) {
            const contentDiv = document.getElementById('parsedContent');
            const insuredInfoDiv = document.getElementById('insuredInfo');
            contentDiv.innerHTML = '';
            insuredInfoDiv.innerHTML = '';

            // Collect all insured info from first result
            let insuredData = null;

            results.forEach((result, fileIndex) => {
                try {
                    // Extract the JSON string from the response
                    let jsonString = result.response || JSON.stringify(result);

                    // Remove markdown code block formatting if present
                    jsonString = jsonString.replace(/^```json\n/, '').replace(/\n```$/, '');

                    // Parse the JSON
                    const data = JSON.parse(jsonString);

                    // Capture insured info from first file
                    if (fileIndex === 0) {
                        insuredData = data;
                    }

                    // Create a column for each file's policies
                    if (data.policies && Array.isArray(data.policies)) {
                        data.policies.forEach((policy, policyIndex) => {
                            const policyColumn = createPolicyColumn(policy, data, fileIndex, policyIndex);
                            contentDiv.appendChild(policyColumn);
                        });
                    } else {
                        // Fallback if no policies array
                        const policyColumn = createPolicyColumn(data, data, fileIndex, 0);
                        contentDiv.appendChild(policyColumn);
                    }

                } catch (e) {
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'bg-red-50 border border-red-200 rounded p-4 policy-column';
                    errorDiv.innerHTML = `
                        <h3 class="text-red-800 font-semibold mb-2">Error parsing file ${fileIndex + 1}</h3>
                        <pre class="text-red-600 text-xs">${e.message}</pre>
                    `;
                    contentDiv.appendChild(errorDiv);
                }
            });

            // Display insured info in horizontal row
            if (insuredData) {
                displayInsuredInfo(insuredData, insuredInfoDiv);
            }
        }

        function displayInsuredInfo(data, container) {
            // Insured Name
            const insuredName = data.insured?.name || null;
            displayCompactField('Insured', insuredName, container);

            // Insured Address
            let fullAddress = null;
            if (data.insured?.address) {
                const addr = data.insured.address;
                const parts = [addr.street, addr.city, addr.state, addr.zip].filter(p => p);
                if (parts.length > 0) {
                    fullAddress = parts.join(', ');
                }
            }
            displayCompactField('Address', fullAddress, container);

            // Agency
            const agencyName = data.agency?.name || null;
            displayCompactField('Agency(Broker)', agencyName, container);

            // Agency Phone
            const agencyPhone = data.agency?.phone || null;
            displayCompactField('Agency Phone', agencyPhone, container);

            // Quote Number
            displayCompactField('Quote #', data.quote_number || null, container);

            // Account Number
            displayCompactField('Account #', data.account_number || null, container);
        }

        function displayCompactField(label, value, container) {
            const fieldDiv = document.createElement('div');
            fieldDiv.className = 'flex items-center gap-1 py-1 px-2 bg-gray-50 rounded';

            const labelDiv = document.createElement('div');
            labelDiv.className = 'text-xs font-semibold text-gray-700 flex-shrink-0';
            labelDiv.textContent = label + ':';

            const valueDiv = document.createElement('div');

            // Check if value is null/undefined/empty
            const isNull = value === null || value === undefined || value === '';

            if (isNull) {
                valueDiv.className = 'field-value text-gray-400 italic text-xs';
                valueDiv.textContent = 'null';
            } else {
                valueDiv.className = 'field-value text-gray-900 text-xs';
                valueDiv.textContent = value;
            }

            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn px-2 py-0.5 bg-blue-500 text-white rounded hover:bg-blue-600 text-xs flex-shrink-0 ml-1';
            copyBtn.textContent = 'Copy';
            copyBtn.onclick = () => copyToClipboard(isNull ? 'null' : value, copyBtn);

            fieldDiv.appendChild(labelDiv);
            fieldDiv.appendChild(valueDiv);
            fieldDiv.appendChild(copyBtn);

            container.appendChild(fieldDiv);
        }

        function createPolicyColumn(policy, fullData, fileIndex, policyIndex) {
            const column = document.createElement('div');
            column.className = 'policy-column bg-white rounded-lg shadow-sm p-2 flex-shrink-0';

            // Header
            const header = document.createElement('div');
            header.className = 'mb-2 pb-1 border-b border-gray-200';
            header.innerHTML = `
                <h3 class="font-semibold text-gray-800 text-xs">Policy #${policyIndex + 1}</h3>
                <p class="text-xs text-gray-400">File ${fileIndex + 1}</p>
            `;
            column.appendChild(header);

            const fieldsContainer = document.createElement('div');
            fieldsContainer.className = 'space-y-1';

            // Display policy-specific fields only
            displayField('Coverage', policy.coverage_type, fieldsContainer);
            displayField('Carrier', policy.carrier, fieldsContainer);
            displayField('Policy #', policy.policy_number, fieldsContainer);
            displayField('Effective', policy.effective_date, fieldsContainer);
            displayField('Expiration', policy.expiration_date, fieldsContainer);
            displayField('Term', policy.policy_term, fieldsContainer);
            displayField('Premium', policy.annual_premium, fieldsContainer);
            displayField('Tax', policy.tax, fieldsContainer);
            displayField('Fee', policy.fee, fieldsContainer);
            displayField('Broker Fee', policy.broker_fee, fieldsContainer);
            displayField('Min Earned %', policy.minimum_earned_percent, fieldsContainer);
            displayField('Min Earned $', policy.minimum_earned_amount, fieldsContainer);

            // Display totals (once per file, on last policy)
            if (fullData.policies && policyIndex === fullData.policies.length - 1 && fullData.totals) {
                const divider = document.createElement('div');
                divider.className = 'border-t border-gray-300 my-1';
                fieldsContainer.appendChild(divider);

                displayField('Total Premium', fullData.totals.total_premium, fieldsContainer);
                displayField('Total Tax', fullData.totals.total_tax, fieldsContainer);
                displayField('Total Fee', fullData.totals.total_fee, fieldsContainer);
                displayField('Grand Total', fullData.totals.grand_total, fieldsContainer);
            }

            // Display financing (once per file, on last policy)
            if (fullData.policies && policyIndex === fullData.policies.length - 1 && fullData.financing) {
                displayField('Deposit', fullData.financing.down_payment, fieldsContainer);
                displayField('Amount Financed', fullData.financing.amount_financed, fieldsContainer);
            }

            column.appendChild(fieldsContainer);
            return column;
        }

        function displayField(label, value, container) {
            const fieldDiv = document.createElement('div');
            fieldDiv.className = 'flex items-center gap-1 py-1 px-2 bg-gray-50 rounded hover:bg-gray-100';

            const labelDiv = document.createElement('div');
            labelDiv.className = 'text-xs font-semibold text-gray-700 w-24 flex-shrink-0';
            labelDiv.textContent = label;

            const valueDiv = document.createElement('div');

            // Check if value is null/undefined/empty
            const isNull = value === null || value === undefined || value === '';

            if (isNull) {
                valueDiv.className = 'field-value flex-1 text-gray-400 italic text-xs';
                valueDiv.textContent = 'null';
            } else {
                valueDiv.className = 'field-value flex-1 text-gray-900 text-xs';
                valueDiv.textContent = value;
            }

            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn px-2 py-0.5 bg-blue-500 text-white rounded hover:bg-blue-600 text-xs flex-shrink-0';
            copyBtn.textContent = 'Copy';
            copyBtn.onclick = () => copyToClipboard(isNull ? 'null' : value, copyBtn);

            fieldDiv.appendChild(labelDiv);
            fieldDiv.appendChild(valueDiv);
            fieldDiv.appendChild(copyBtn);

            container.appendChild(fieldDiv);
        }

        // Track original status
        let originalStatus = null;

        // Status dropdown change handler - just enable Save button
        document.getElementById('statusDropdown').addEventListener('change', function(e) {
            const saveBtn = document.getElementById('saveBtn');

            // Enable Save button if status changed
            if (e.target.value !== originalStatus) {
                saveBtn.disabled = false;
            } else {
                saveBtn.disabled = true;
            }
        });

        // Save button handler
        document.getElementById('saveBtn').addEventListener('click', async function() {
            const statusDropdown = document.getElementById('statusDropdown');
            const newStatus = statusDropdown.value;
            const saveBtn = document.getElementById('saveBtn');
            const cancelBtn = document.getElementById('cancelBtn');

            try {
                saveBtn.disabled = true;
                cancelBtn.disabled = true;

                const response = await fetch(`/api/submission/${submissionId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                const data = await response.json();

                if (data.success) {
                    // Redirect to kanban board
                    window.location.href = '/';
                } else {
                    alert('Error updating status: ' + data.error);
                    saveBtn.disabled = false;
                    cancelBtn.disabled = false;
                }
            } catch (error) {
                console.error('Error updating status:', error);
                alert('Error updating status');
                saveBtn.disabled = false;
                cancelBtn.disabled = false;
            }
        });

        // Cancel button handler
        document.getElementById('cancelBtn').addEventListener('click', function() {
            // Return to kanban board without saving
            window.location.href = '/';
        });

        // Load submission data on page load
        loadSubmission();

    </script>
</body>
</html>
